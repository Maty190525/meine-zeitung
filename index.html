<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 100vw; height: 1600px; margin: 0; padding: 0;
            background: #f4f2ee; font-family: 'Times New Roman', serif;
            color: #000; display: flex; flex-direction: column;
            overflow: hidden; box-sizing: border-box;
        }
        .newspaper-header { text-align: center; padding: 30px 0 20px 0; border-bottom: 4px solid #000; }
        .newspaper-header h1 { font-size: 110px; margin: 0; font-weight: 900; text-transform: uppercase; }
        .meta-info { text-align: center; font-size: 34px; font-weight: bold; margin-top: 10px; }
        .news-container { flex-grow: 1; padding: 20px 40px; column-count: 2; column-gap: 40px; }
        .news-item { margin-bottom: 30px; break-inside: avoid; }
        h2 { font-size: 40px; font-weight: 800; margin: 0 0 8px 0; line-height: 1.1; }
        p { font-size: 28px; font-weight: 500; line-height: 1.35; margin: 0; }
        .img { width: 100%; border: 2px solid #000; margin-bottom: 10px; }
        
        .finance-box {
            margin-top: 20px;
            padding: 20px;
            border-top: 4px solid #000;
        }
        .finance-box table { width: 100%; border-collapse: collapse; font-size: 30px; }
        .finance-box th { text-align: left; border-bottom: 2px solid #000; padding: 10px 0; }
        .finance-box td { padding: 15px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="newspaper-header">
        <h1>Merseburger Post</h1>
        <div class="meta-info" id="datetime"></div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('datetime').innerHTML = 
                now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) + 
                " | " + now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        }
        updateTime();
    </script>

    <div class="news-container">

        <div class="finance-box">
            <table>
                <tr><th>Asset</th><th>Markt</th></tr>
                <tr><td>Novo Nordisk</td><td>Aktie</td></tr>
                <tr><td>Nasdaq 100</td><td>ETF</td></tr>
                <tr><td>Cardano (ADA)</td><td>Krypto</td></tr>
                <tr><td>Polkadot (DOT)</td><td>Krypto</td></tr>
            </table>
        </div>
    </div>
</body>
</html>

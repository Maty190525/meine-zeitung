<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            width: 1200px; 
            padding: 40px; 
            margin: 0; 
            font-family: 'Times New Roman', serif; 
            color: #000000; 
            background-color: #ffffff; 
        }
        .newspaper-header { 
            position: relative; 
            text-align: center; 
            border-bottom: 8px solid #000000; 
            padding-bottom: 20px; 
            margin-bottom: 40px; 
        }
        .newspaper-title { 
            font-size: 110px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin: 0; 
        }
        /* Uhrzeit oben rechts ohne "Stand:" */
        #update-time { 
            position: absolute; 
            top: 0; 
            right: 0; 
            font-size: 24px; 
            font-style: italic; 
            font-family: sans-serif;
        }
        .newspaper-date { 
            font-size: 35px; 
            font-style: italic; 
            margin-top: 10px; 
        }
        .news-item { 
            display: flex; 
            gap: 30px; 
            border-bottom: 2px solid #000; 
            padding: 25px 0; 
            align-items: flex-start; 
        }
        .news-image { 
            width: 400px; 
            height: 250px; 
            object-fit: cover; 
            border: 1px solid #000; 
            flex-shrink: 0; 
        }
        .news-text { flex-grow: 1; }
        .ressort { 
            color: #8b0000; 
            font-size: 22px; 
            text-transform: uppercase; 
            font-weight: bold; 
            margin-bottom: 5px; 
        }
        h1 { font-size: 40px; line-height: 1.1; margin: 0 0 10px 0; }
        p { font-size: 28px; line-height: 1.3; margin: 0; text-align: justify; }
    </style>
</head>
<body>

    <div class="newspaper-header">
        <div id="update-time"></div>
        <div class="newspaper-title">Merseburger Post</div>
        <div class="newspaper-date" id="date"></div>
        
        <script>
            (function() {
                var now = new Date();
                var dateEl = document.getElementById('date');
                var timeEl = document.getElementById('update-time');
                if(dateEl) {
                    dateEl.innerText = now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                }
                if(timeEl) {
                    timeEl.innerText = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + " Uhr";
                }
            })();
        </script>
    </div>

    <div class="news-item">
        <img class="news-image" src="">
        <div class="news-text">
            <div class="ressort">Top-Thema</div>
            <h1></h1>
            <p></p>
        </div>
    </div>

    <div class="news-item">
        <img class="news-image" src="">
        <div class="news-text">
            <div class="ressort">Politik & Wirtschaft</div>
            <h1></h1>
            <p></p>
        </div>
    </div>

    <div class="news-item">
        <img class="news-image" src="">
        <div class="news-text">
            <div class="ressort">Ausland & Welt</div>
            <h1></h1>
            <p></p>
        </div>
    </div>

    <div class="news-item">
        <img class="news-image" src="">
        <div class="news-text">
            <div class="ressort">Wissen & Panorama</div>
            <h1></h1>
            <p></p>
        </div>
    </div>

    <div class="news-item">
        <img class="news-image" src="">
        <div class="news-text">
            <div class="ressort">Aktuelles</div>
            <h1></h1>
            <p></p>
        </div>
    </div>

</body>
</html>
